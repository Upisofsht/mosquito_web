<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蚊子監測系統 · Vector Watch</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="/css/leaflet.css" />
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <!-- Vector Watch dashboard styles -->
    <link rel="stylesheet" href="/css/styles.css?v=2026070704" />

    <style>
        /* Layout primitives — kept in <head> per legacy convention. */
        body,
        html {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #container { display: flex; flex-direction: column; height: 100%; }
        #map-container { flex: 1; min-height: 0; position: relative; }
        #map { width: 100%; height: 100%; }

        /* 裝置狀態卡片可點擊：點一下跳到該裝置（同「裝置快速跳轉」） */
        .health-card--clickable { cursor: pointer; }
        .health-card--clickable:hover { filter: brightness(1.03); }
        .health-card--clickable:focus-visible {
            outline: 2px solid var(--vw-accent, #2f7de1);
            outline-offset: 2px;
        }
    </style>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <!-- Plotly JS -->
    <script src="https://cdn.plot.ly/plotly-2.21.0.min.js"></script>
    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body>
    <div id="container">
        <div id="mobile-scrim" hidden onclick="toggleFilterPanel(true)"></div>
        <!-- ============================================================
             Top toolbar: brand · controls · KPI chips · health toggle
             ============================================================ -->
        <header id="app-toolbar" class="app-toolbar" aria-label="查詢與裝置選擇">

            <!-- Brand block -->
            <div class="vw-brand">
                <div class="vw-brand__mark" aria-hidden="true">
                    <!-- Mosquito glyph (simple, monochrome on teal) -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 4v6" />
                        <path d="M12 10c-2.2 0-4 1.8-4 4v3l-3 2" />
                        <path d="M12 10c2.2 0 4 1.8 4 4v3l3 2" />
                        <path d="M8 6c-1.5-1-3.5-1-5 0" />
                        <path d="M16 6c1.5-1 3.5-1 5 0" />
                        <circle cx="12" cy="20" r="1.2" fill="currentColor" stroke="none" />
                    </svg>
                </div>
                <div>
                    <div class="vw-brand__title">蚊子監測系統</div>
                    <div class="vw-brand__sub">Vector Watch</div>
                </div>
            </div>

            <!-- Centre: query controls -->
            <div class="vw-controls">
                <!-- Legacy hidden contract labels (display:contents) -->
                <span class="app-toolbar__label" hidden>時間範圍</span>

                <div class="vw-control">
                    <label class="vw-control__label" for="start-time">開始時間</label>
                    <div class="vw-control__row">
                        <span class="app-toolbar__sublabel" hidden></span>
                        <button type="button" id="start-time" class="app-toolbar__time-btn vw-time-btn" aria-label="選擇開始時間"></button>
                        <span class="vw-range-arrow" aria-hidden="true">→</span>
                    </div>
                </div>

                <div class="vw-control">
                    <label class="vw-control__label" for="end-time">結束時間</label>
                    <div class="vw-control__row">
                        <span class="app-toolbar__sublabel" hidden></span>
                        <button type="button" id="end-time" class="app-toolbar__time-btn vw-time-btn" aria-label="選擇結束時間"></button>
                    </div>
                </div>

                <div class="vw-control">
                    <label class="vw-control__label" for="mosquito-box">蚊種篩選</label>
                    <div class="vw-control__row">
                        <span class="app-toolbar__sublabel" hidden></span>
                        <select id="mosquito-box" class="vw-select">
                            <option value="all">全部種類</option>
                            <option value="m5">AG 斑紋類</option>
                            <option value="m6">HG 家蚊類</option>
                        </select>
                    </div>
                </div>

                <div class="vw-control">
                    <label class="vw-control__label" for="device-jump">裝置快速跳轉</label>
                    <div class="vw-control__row">
                        <span class="app-toolbar__sublabel" hidden></span>
                        <select id="device-jump" class="vw-select" title="選擇裝置並移動地圖、開啟資訊">
                            <option value="">— 選擇裝置 —</option>
                        </select>
                    </div>
                </div>

                <div class="vw-control">
                    <label class="vw-control__label">&nbsp;</label>
                    <div class="vw-control__row">
                        <button type="button" id="fetch-data" class="app-toolbar__primary vw-btn" aria-label="確認查詢">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <circle cx="11" cy="11" r="7" />
                                <path d="M20 20l-3.5-3.5" />
                            </svg>
                            確認查詢
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right: KPI chips + health toggle -->
            <div class="vw-toolbar-right">
                <div class="vw-kpis" role="group" aria-label="即時摘要">
                    <div class="vw-kpi" title="本查詢區間內所有裝置之捕獲總數">
                        <div class="vw-kpi__icon vw-kpi__icon--teal" aria-hidden="true">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 21V8l9-5 9 5v13" /><path d="M9 21v-7h6v7" />
                            </svg>
                        </div>
                        <div class="vw-kpi__text">
                            <span class="vw-kpi__label">區間捕獲</span>
                            <span class="vw-kpi__value" id="kpi-catch-total">—</span>
                        </div>
                    </div>

                    <div class="vw-kpi" title="目前在線裝置數 / 全部裝置">
                        <div class="vw-kpi__icon vw-kpi__icon--ok" aria-hidden="true">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 12.5a7 7 0 0114 0" /><path d="M8.5 16a3.5 3.5 0 017 0" /><circle cx="12" cy="19.5" r="1" fill="currentColor" stroke="none" />
                            </svg>
                        </div>
                        <div class="vw-kpi__text">
                            <span class="vw-kpi__label">在線裝置</span>
                            <span class="vw-kpi__value vw-kpi__value--ok" id="kpi-online">—<sup id="kpi-online-total">/ —</sup></span>
                        </div>
                    </div>

                    <div class="vw-kpi" title="任一指標超過警示門檻的裝置數">
                        <div class="vw-kpi__icon vw-kpi__icon--warn" aria-hidden="true">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 3l10 17H2L12 3z" /><path d="M12 10v5" /><circle cx="12" cy="18" r=".8" fill="currentColor" stroke="none" />
                            </svg>
                        </div>
                        <div class="vw-kpi__text">
                            <span class="vw-kpi__label">健康警示</span>
                            <span class="vw-kpi__value" id="kpi-alerts">—</span>
                        </div>
                    </div>
                </div>

                <button type="button" id="filter-btn" class="vw-btn vw-btn--ghost vw-mobile-only" onclick="toggleFilterPanel()" aria-controls="health-panel" aria-expanded="false">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 5h18M6 12h12M10 19h4" />
                    </svg>
                    篩選
                </button>
                <button type="button" id="health-btn" class="vw-btn vw-btn--ghost" onclick="toggleHealthPanel()" aria-controls="health-panel" aria-expanded="false">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 12h4l2-6 4 12 2-6h6" />
                    </svg>
                    裝置狀態
                </button>
            </div>
        </header>

        <!-- ============================================================
             Health panel — desktop floating card / mobile sheet
             ============================================================ -->
        <div id="health-panel" hidden role="dialog" aria-labelledby="health-panel-title">
            <div class="health-panel__header">
                <div class="health-panel__title-row">
                    <strong id="health-panel-title">裝置健康狀態</strong>
                    <span class="health-panel__subtitle" id="health-panel-meta">最近更新 —</span>
                </div>
                <div class="health-panel__actions">
                    <button type="button" class="health-panel__refresh" onclick="loadHealthData()" aria-label="重新整理">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M3 12a9 9 0 0115.5-6.3L21 8" /><path d="M21 3v5h-5" />
                            <path d="M21 12a9 9 0 01-15.5 6.3L3 16" /><path d="M3 21v-5h5" />
                        </svg>
                        重新整理
                    </button>
                    <button type="button" class="health-panel__close" onclick="toggleHealthPanel()" aria-label="關閉">✕</button>
                </div>
            </div>

            <div class="health-panel__body">
                <!-- Legacy table is kept in DOM for mapFunctions.js / health renderer.
                     CSS forces display:none so we always render cards. -->
                <table id="health-table" class="health-table health-table--desktop" aria-hidden="true">
                    <thead>
                        <tr>
                            <th>裝置</th><th>狀態</th><th>CPU 溫度</th><th>磁碟</th><th>待傳</th>
                        </tr>
                    </thead>
                    <tbody id="health-tbody">
                        <tr><td colspan="5" class="health-table__placeholder">載入中…</td></tr>
                    </tbody>
                </table>

                <!-- Card grid (rendered on every viewport) -->
                <div id="health-cards" class="health-cards health-cards--mobile" aria-live="polite">
                    <div class="vw-empty">載入中…</div>
                </div>
            </div>
        </div>

        <!-- ============================================================
             Map
             ============================================================ -->
        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>

    <!-- Map function library (DO NOT MODIFY) -->
    <script src="/js/mapFunctions.js?v=20260522"></script>
    <script>
        // ============================================================
        // Map init — unchanged contract with mapFunctions.js
        // ============================================================
        const map = L.map('map', {
            center: [22.6273, 120.3014],
            zoom: 10,
            minZoom: 3,
            maxZoom: 18,
            maxBounds: [[-90, -180], [90, 180]],
            maxBoundsViscosity: 1.0,
        });
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
        }).addTo(map);
        window.addEventListener('resize', () => map.invalidateSize());

        // 手機上 flatpickr 預設改用原生輸入框;因它綁在 <button>(非 <input>),
        // 無法用 type="hidden" 隱藏原按鈕,會出現「原按鈕 + 原生輸入框」重複。
        // 一律停用手機原生模式,改用自訂日曆(桌機本來就是自訂日曆,不受影響)。
        if (window.flatpickr) flatpickr.setDefaults({ disableMobile: true });

        initControls(map, (s, e) => fetchDataByTimeAndRenderMarkers(s, e, map));
        fetchDataByTimeAndRenderMarkers(getDefaultStartTime(), getDefaultEndTime(), map);

        // ============================================================
        // Health panel — improved rendering + KPI integration
        // ============================================================
        const HEALTH_THRESHOLDS = {
            cpu: { warn: 60, alert: 75 },
            disk: { warn: 70, alert: 85 },
            pending: { warn: 5, alert: 20 },
        };

        // 裝置健康資料快取（device_name → 該筆資料），供地圖 popup 顯示在線狀態。
        // 與「裝置狀態」面板共用同一份 /api/device-health 資料。
        let healthByName = new Map();

        function toggleHealthPanel() {
            const panel = document.getElementById('health-panel');
            const btn = document.getElementById('health-btn');
            if (panel.hidden) {
                // 互斥:開裝置狀態前先關篩選面板
                toggleFilterPanel(true);
                panel.hidden = false;
                btn.setAttribute('aria-expanded', 'true');
                btn.classList.add('vw-btn--active');
                loadHealthData();
            } else {
                panel.hidden = true;
                btn.setAttribute('aria-expanded', 'false');
                btn.classList.remove('vw-btn--active');
            }
        }

        // 手機「篩選」底部面板開關。forceClose=true 時只關不切換。
        function toggleFilterPanel(forceClose) {
            const controls = document.querySelector('.vw-controls');
            const scrim = document.getElementById('mobile-scrim');
            const btn = document.getElementById('filter-btn');
            if (!controls) return;
            const willOpen = forceClose ? false : !controls.classList.contains('is-open');
            if (willOpen) {
                // 互斥:先關裝置狀態面板
                const health = document.getElementById('health-panel');
                if (health && !health.hidden) toggleHealthPanel();
                controls.classList.add('is-open');
                if (scrim) scrim.hidden = false;
                if (btn) btn.setAttribute('aria-expanded', 'true');
            } else {
                controls.classList.remove('is-open');
                if (scrim) scrim.hidden = true;
                if (btn) btn.setAttribute('aria-expanded', 'false');
            }
        }

        // 依裝置名稱跳到地圖上的該裝置：重用「裝置快速跳轉」下拉選單既有邏輯，
        // 不改動 mapFunctions.js。下拉選項文字格式為 `${name}（${countLabel}）`。
        function jumpToDeviceByName(deviceName) {
            const sel = document.getElementById('device-jump');
            if (!sel || !deviceName) return false;
            let matched = null;
            for (const opt of sel.options) {
                if (!opt.value) continue;
                const namePart = opt.textContent.split('（')[0].trim();
                if (namePart === deviceName) { matched = opt; break; }
            }
            if (!matched) return false;
            sel.value = matched.value;
            sel.dispatchEvent(new Event('change'));
            // 跳轉後關閉健康面板，讓地圖與 popup 清楚可見（面板在手機上會蓋住地圖）
            const panel = document.getElementById('health-panel');
            if (panel && !panel.hidden) toggleHealthPanel();
            return true;
        }

        // ============================================================
        // 地圖 popup：在「資料」頁注入在線狀態欄（與裝置狀態面板一致）
        // 不改 mapFunctions.js，改由 popupopen 事件動態插入。
        // ============================================================
        function _statusDdHtml(online) {
            const label = online == null ? '未知' : (online ? '在線' : '離線');
            const color = online == null ? '#8a8f98' : (online ? '#15A36F' : '#DB4C4C');
            return `<span class="mos-popup__status-dd" style="color:${color};font-weight:600">● ${label}</span>`;
        }

        function _injectPopupStatus(root) {
            if (!root) return;
            const dl = root.querySelector('.mos-popup__dl');
            if (!dl) return; // 設定頁沒有 dl，略過
            const nameBtn = root.querySelector('[id^="device-name-btn-"]');
            const deviceName = nameBtn ? nameBtn.textContent.trim() : '';
            if (!deviceName) return;
            const rec = healthByName.get(deviceName);
            const online = rec ? !!rec.online : null;

            let item = dl.querySelector('.mos-popup__status-item');
            if (!item) {
                item = document.createElement('div');
                item.className = 'mos-popup__dl-item mos-popup__status-item';
                item.innerHTML = `<dt>狀態</dt><dd></dd>`;
                // 放在「裝置名稱」欄之後
                const first = dl.querySelector('.mos-popup__dl-item');
                if (first && first.nextSibling) dl.insertBefore(item, first.nextSibling);
                else dl.appendChild(item);
            }
            // 只在狀態改變時才寫入，避免 MutationObserver 因自身變更而無限迴圈
            const key = String(online);
            if (item.dataset.statusState === key) return;
            item.dataset.statusState = key;
            item.querySelector('dd').innerHTML = _statusDdHtml(online);
        }

        // 當健康資料更新時，若有開啟中的 popup 一併刷新其狀態欄
        function _refreshOpenPopupStatus() {
            document.querySelectorAll('.leaflet-popup-content').forEach(_injectPopupStatus);
        }

        let _popupStatusObserver = null;
        map.on('popupopen', (e) => {
            const root = e.popup.getElement();
            _injectPopupStatus(root);
            // popup 內容在切換「設定」時會整段重建，用 observer 確保狀態欄補回
            if (_popupStatusObserver) _popupStatusObserver.disconnect();
            if (root && window.MutationObserver) {
                _popupStatusObserver = new MutationObserver(() => _injectPopupStatus(root));
                _popupStatusObserver.observe(root, { childList: true, subtree: true });
            }
            // 開啟時順手抓一次最新健康資料，確保狀態即時
            fetch('/api/device-health')
                .then(r => r.json())
                .then(data => { if (Array.isArray(data)) { healthByName = new Map(data.map(d => [d.device_name, d])); _injectPopupStatus(root); } })
                .catch(() => {});
        });
        map.on('popupclose', () => {
            if (_popupStatusObserver) { _popupStatusObserver.disconnect(); _popupStatusObserver = null; }
        });

        function _level(val, t) {
            if (val == null) return 'muted';
            if (val > t.alert) return 'alert';
            if (val > t.warn)  return 'warn';
            return 'ok';
        }

        function _fmtVal(val, suffix) {
            if (val == null) return '—';
            return `${val}${suffix || ''}`;
        }

        function _renderCard(d) {
            const cpuLevel  = _level(d.cpu_temp, HEALTH_THRESHOLDS.cpu);
            const diskLevel = _level(d.disk_pct, HEALTH_THRESHOLDS.disk);
            const pendLevel = _level(d.pending_count, HEALTH_THRESHOLDS.pending);

            // overall card accent = worst severity (only when online; offline = grey)
            const worst = !d.online
                ? 'off'
                : [cpuLevel, diskLevel, pendLevel].includes('alert')
                    ? 'alert'
                    : [cpuLevel, diskLevel, pendLevel].includes('warn')
                        ? 'warn'
                        : 'ok';

            const statusClass = d.online ? 'health-card__status--online' : 'health-card__status--offline';
            const statusLabel = d.online ? '在線' : '離線';

            // mini bars: cpu by % of 100°C cap (display only); disk by %; pending by % of 25
            const cpuPct  = d.cpu_temp     != null ? Math.min(100, (d.cpu_temp / 90) * 100)  : 0;
            const diskPct = d.disk_pct     != null ? Math.min(100, d.disk_pct)                : 0;
            const pendPct = d.pending_count != null ? Math.min(100, (d.pending_count / 25) * 100) : 0;

            return `
                <article class="health-card health-card--${worst} health-card--clickable" data-device="${d.device_name}" role="button" tabindex="0" title="點一下跳到此裝置">
                    <div class="health-card__name">${d.device_name}</div>
                    <div class="health-card__status ${statusClass}">
                        <span class="health-card__dot"></span>${statusLabel}
                    </div>
                    <div class="health-card__metrics">
                        <div class="health-card__metric">
                            <span class="health-card__metric-label">CPU 溫度</span>
                            <span class="health-card__metric-value health-card__metric-value--${cpuLevel}">${_fmtVal(d.cpu_temp, '°C')}</span>
                            <div class="health-card__bar health-card__bar--${cpuLevel}"><i style="width:${cpuPct}%"></i></div>
                        </div>
                        <div class="health-card__metric">
                            <span class="health-card__metric-label">磁碟</span>
                            <span class="health-card__metric-value health-card__metric-value--${diskLevel}">${_fmtVal(d.disk_pct, '%')}</span>
                            <div class="health-card__bar health-card__bar--${diskLevel}"><i style="width:${diskPct}%"></i></div>
                        </div>
                        <div class="health-card__metric">
                            <span class="health-card__metric-label">待傳張數</span>
                            <span class="health-card__metric-value health-card__metric-value--${pendLevel}">${_fmtVal(d.pending_count, '')}</span>
                            <div class="health-card__bar health-card__bar--${pendLevel}"><i style="width:${pendPct}%"></i></div>
                        </div>
                    </div>
                </article>`;
        }

        function _updateKpis(data) {
            if (Array.isArray(data)) {
                healthByName = new Map(data.map(d => [d.device_name, d]));
                _refreshOpenPopupStatus();
            }
            const onlineN = data.filter(d => d.online).length;
            const totalN  = data.length;
            const alerts  = data.filter(d => {
                if (!d.online) return true;
                const c = _level(d.cpu_temp, HEALTH_THRESHOLDS.cpu);
                const k = _level(d.disk_pct, HEALTH_THRESHOLDS.disk);
                const p = _level(d.pending_count, HEALTH_THRESHOLDS.pending);
                return [c, k, p].includes('warn') || [c, k, p].includes('alert');
            }).length;

            const onlineEl = document.getElementById('kpi-online');
            const onlineTot = document.getElementById('kpi-online-total');
            if (onlineEl) onlineEl.firstChild.nodeValue = onlineN;
            if (onlineTot) onlineTot.textContent = `/ ${totalN}`;

            const alertsEl = document.getElementById('kpi-alerts');
            if (alertsEl) {
                alertsEl.textContent = alerts;
                alertsEl.className = 'vw-kpi__value ' + (alerts === 0 ? 'vw-kpi__value--ok' : alerts >= 3 ? 'vw-kpi__value--alert' : 'vw-kpi__value--warn');
            }

            // Catch total uses mapFunctions.js-loaded data if available; otherwise leave dash
            try {
                if (window.__lastMarkers && Array.isArray(window.__lastMarkers)) {
                    const total = window.__lastMarkers.reduce((acc, m) => acc + (parseInt(m.count, 10) || 0), 0);
                    const el = document.getElementById('kpi-catch-total');
                    if (el) el.textContent = total.toLocaleString('zh-Hant-TW');
                }
            } catch (e) { /* noop */ }

            const meta = document.getElementById('health-panel-meta');
            if (meta) {
                const now = new Date();
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                meta.textContent = `最近更新 ${hh}:${mm}`;
            }
        }

        function loadHealthData() {
            const cards = document.getElementById('health-cards');
            const tbody = document.getElementById('health-tbody');
            cards.innerHTML = '<div class="vw-empty">載入中…</div>';

            fetch('/api/device-health')
                .then(r => r.json())
                .then(data => {
                    if (!data.length) {
                        cards.innerHTML = '<div class="vw-empty">目前沒有裝置資料</div>';
                        tbody.innerHTML = '<tr><td colspan="5" class="health-table__placeholder">無資料</td></tr>';
                        _updateKpis([]);
                        return;
                    }

                    cards.innerHTML = data.map(_renderCard).join('');

                    // Keep legacy table populated (some downstream code or screen
                    // readers may look at it). CSS hides it from view.
                    tbody.innerHTML = data.map(d => {
                        const dot = d.online
                            ? '<span style="color:#15A36F">●</span> 在線'
                            : '<span style="color:#DB4C4C">●</span> 離線';
                        return `<tr>
                            <td>${d.device_name}</td>
                            <td>${dot}</td>
                            <td>${d.cpu_temp ?? '—'}</td>
                            <td>${d.disk_pct ?? '—'}</td>
                            <td>${d.pending_count ?? '—'}</td>
                        </tr>`;
                    }).join('');

                    _updateKpis(data);
                })
                .catch(err => {
                    console.error('health fetch failed', err);
                    cards.innerHTML = '<div class="vw-empty vw-empty--error">載入失敗，請稍後再試</div>';
                    tbody.innerHTML = '<tr><td colspan="5" class="health-table__placeholder">載入失敗</td></tr>';
                });
        }

        // Eagerly populate KPIs on load (silent — re-uses /api/device-health).
        // Health panel stays closed until user clicks.
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/device-health')
                .then(r => r.json())
                .then(_updateKpis)
                .catch(() => {});

            // 事件委派：點擊或按 Enter/Space 於裝置卡片即跳轉到該裝置
            const cardsEl = document.getElementById('health-cards');
            if (cardsEl) {
                cardsEl.addEventListener('click', (e) => {
                    const card = e.target.closest('.health-card--clickable');
                    if (card) jumpToDeviceByName(card.dataset.device);
                });
                cardsEl.addEventListener('keydown', (e) => {
                    if (e.key !== 'Enter' && e.key !== ' ') return;
                    const card = e.target.closest('.health-card--clickable');
                    if (card) { e.preventDefault(); jumpToDeviceByName(card.dataset.device); }
                });
            }

            // 手機:按「確認查詢」後收起篩選面板(mapFunctions.js 的查詢仍照舊執行)
            const fetchBtn = document.getElementById('fetch-data');
            if (fetchBtn) {
                fetchBtn.addEventListener('click', () => {
                    if (window.matchMedia('(max-width: 640px)').matches) toggleFilterPanel(true);
                });
            }
            // 手機:於面板內選裝置跳轉後也收起面板
            const deviceJump = document.getElementById('device-jump');
            if (deviceJump) {
                deviceJump.addEventListener('change', () => {
                    if (window.matchMedia('(max-width: 640px)').matches) toggleFilterPanel(true);
                });
            }
        });

        // ============================================================
        // KPI: catch total — 直接吃 mapFunctions.js 的事件，避免重複 fetch
        // ============================================================
        document.addEventListener('mos:markers-loaded', (ev) => {
            const rows = ev.detail;
            if (!Array.isArray(rows)) return;
            const total = rows.reduce((acc, m) => acc + (parseInt(m.count ?? m.m5 ?? 0, 10) || 0), 0);
            const el = document.getElementById('kpi-catch-total');
            if (el) el.textContent = total.toLocaleString('zh-Hant-TW');
        });
    </script>
</body>
</html>
